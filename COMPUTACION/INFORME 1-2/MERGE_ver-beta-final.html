# -- Autor: Elmer Juarez / Correo de contacto: e24.elmerjuarez.juareza@suizoamaericano.edu.gt
# -- Descipcion: El algoritmo de Merge es un método eficiente para combinar dos vectores ordenados en un solo vector ordenado. El proceso implica comparar los elementos de ambas listas y fusionarlos en uno nuevo vector, manteniendo el orden. 
# -- Lenguaje: JavaScript y HTML para la interfaz gráfica.
# -- Recursos: Navegador Web
# -- Procesos: 
#    1. Agregar un valor centinela para cada vector.
#    2. Comparar los elementos de ambos vectores y fusionarlos en un nuevo vector ordenado, mediante un ciclo que va iniciar desde 0 hasta la longitud del nuevo vector.
        a. Si el elemento del primer vector es menor o igual al elemento del segundo vector, se agrega el elemento del primer vector al nuevo vector y se incrementa el índice del primer vector.
        b. Si el elemento del segundo vector es menor que el elemento del primer vector, se agrega el elemento del segundo vector al nuevo vector y se incrementa el índice del segundo vector.
# -- Historia: Fecha de creacion 03/03/2026 Fecha de modificacion: 05/03/2026
# -- Ajustes pendientes: Ninguno 
# ======================================================================================================================================================================================================================================-->

    <script src="MERGE_ver-beta-final.js"></script> <!--Enlazamos el archivo de JS-->
    <style>

<body>

</body>
</html>
